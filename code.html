<!DOCTYPE html>
<!-- nice try 👀 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locked</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
    font-family:Arial,sans-serif;
    color:#fff
}
.lock{width:300px;text-align:center}
.display{
    height:45px;
    margin-bottom:15px;
    font-size:22px;
    letter-spacing:6px;
    border-bottom:2px solid #444;
    padding:8px
}
.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px
}
button{
    height:65px;
    font-size:22px;
    border-radius:50%;
    border:none;
    background:#1c1c1c;
    color:#fff;
    cursor:pointer
}
button:hover{background:#333}
.zero{grid-column:span 3;border-radius:40px}
.enter{background:#0a84ff}
.shake{animation:s .3s}
@keyframes s{
    0%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
    100%{transform:translateX(0)}
}
</style>
</head>

<body>
<div class="lock">
    <div id="d" class="display"></div>

    <div class="keypad">
        <button onclick="p(1)">1</button>
        <button onclick="p(2)">2</button>
        <button onclick="p(3)">3</button>
        <button onclick="p(4)">4</button>
        <button onclick="p(5)">5</button>
        <button onclick="p(6)">6</button>
        <button onclick="p(7)">7</button>
        <button onclick="p(8)">8</button>
        <button onclick="p(9)">9</button>
        <button class="zero" onclick="p(0)">0</button>
        <button class="enter" onclick="c()">Enter</button>
    </div>
</div>

<script>
(()=>{const h="b68cdb9fdf3baf1b7dc12c7b61d1b0baf0e9b2b13b3b15fa9dfb1c2f0c1c6c52",
u="https://www.dropbox.com/scl/fo/s4kl3vjrbi2sod6ukkmnt/ALpsxTKVaIl5DhJhU0y32R8?rlkey=1jwllfgf4zeea4qjc88kml5ae&st=qm44637q&dl=0";
let v="";
window.p=n=>{
    v+=n;
    document.getElementById("d").textContent="•".repeat(v.length)
};
const s=async t=>{
    const e=new TextEncoder().encode(t),
    r=await crypto.subtle.digest("SHA-256",e);
    return [...new Uint8Array(r)].map(b=>b.toString(16).padStart(2,"0")).join("")
};
window.c=async()=>{
    const r=await s(v),d=document.getElementById("d");
    if(r===h)window.open(u,"_blank");
    else{
        d.classList.add("shake");
        setTimeout(()=>d.classList.remove("shake"),300)
    }
    v="";
    d.textContent=""
};
})();
</script>
</body>
</html>
